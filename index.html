<!doctype html><html lang="ja"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>貸金業務取扱主任者 ○×トレーニング</title><meta name="theme-color" content="#3157d5"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="default"><meta name="apple-mobile-web-app-title" content="貸金○×"><link rel="manifest" href="manifest.webmanifest"><link rel="apple-touch-icon" href="icon-192.png"><style>
:root{--bg:#f4f6fb;--card:#fff;--ink:#18202a;--muted:#667085;--accent:#3157d5;--ok:#138a54;--ng:#c53c3c;--line:#e5e9f2}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic UI",sans-serif}button,input,select,textarea{font:inherit}.app{max-width:720px;margin:auto;min-height:100vh;padding:env(safe-area-inset-top) 14px calc(30px + env(safe-area-inset-bottom))}header{padding:18px 4px 10px}.title{font-weight:800;font-size:22px}.sub{color:var(--muted);font-size:13px;margin-top:5px}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:18px;box-shadow:0 6px 20px rgba(25,34,60,.06)}.toprow{display:flex;justify-content:space-between;gap:12px;align-items:center}.pill{font-size:12px;background:#eef2ff;color:var(--accent);padding:6px 9px;border-radius:999px;font-weight:700}.progress{height:8px;background:#e9edf5;border-radius:99px;overflow:hidden;margin:14px 0 18px}.progress i{display:block;height:100%;background:var(--accent);width:0}.qnum{color:var(--muted);font-size:13px}.qtext{font-size:18px;line-height:1.75;font-weight:650;margin:12px 0 20px}.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px}.choice{border:2px solid var(--line);background:white;border-radius:15px;padding:16px;font-size:24px;font-weight:900}.choice.circle{color:var(--ok)}.choice.cross{color:var(--ng)}.choice:disabled{opacity:.55}.feedback{display:none;margin-top:16px;padding:14px;border-radius:14px;font-weight:800}.feedback.ok{display:block;background:#eaf8f1;color:var(--ok)}.feedback.ng{display:block;background:#fff0f0;color:var(--ng)}details{margin-top:12px;border-top:1px solid var(--line);padding-top:12px}summary{font-weight:750;cursor:pointer}.explain{color:#384250;line-height:1.75;margin-top:10px}.actions{display:flex;gap:10px;margin-top:16px}.btn{border:0;border-radius:12px;padding:13px 16px;font-weight:750;background:#e9edf5;color:#273141}.btn.primary{background:var(--accent);color:white;flex:1}.btn:disabled{opacity:.4}.screen{display:none}.screen.active{display:block}.resultScore{text-align:center;font-size:52px;font-weight:900;margin:12px}.pass{color:var(--ok)}.fail{color:var(--ng)}.bars{display:grid;gap:12px;margin-top:18px}.barrow .label{display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px}.bar{height:9px;background:#edf0f5;border-radius:99px;overflow:hidden}.bar i{display:block;height:100%;background:var(--accent)}.analysis{margin-top:18px;line-height:1.7;background:#f8f9fc;padding:14px;border-radius:14px}.toolbar{display:flex;gap:8px;overflow:auto;padding:2px 0 12px}.toolbar button{white-space:nowrap}.uploadbox{border:2px dashed #cfd6e6;border-radius:16px;padding:20px;text-align:center}.small{font-size:12px;color:var(--muted);line-height:1.6}.field{width:100%;border:1px solid var(--line);border-radius:10px;padding:10px;margin:6px 0}.draft{margin-top:14px;max-height:420px;overflow:auto}.draftitem{border-top:1px solid var(--line);padding:12px 0;text-align:left}.warn{background:#fff7e8;color:#7a4d00;padding:12px;border-radius:12px;font-size:13px;line-height:1.6;margin:12px 0}@media(max-width:420px){.qtext{font-size:17px}.card{padding:16px}.choice{padding:14px}}</style></head><body><div class="app"><header><div class="title">貸金業務取扱主任者 ○×</div><div class="sub">第1回 模試・50問／スマホ対応</div></header>
<div class="toolbar"><button class="btn" onclick="show('quiz')">問題を解く</button><button class="btn" onclick="show('sets')">問題セット</button><button class="btn" onclick="show('import')">画像・PDF追加</button></div>
<section id="quiz" class="screen active"><div class="card"><div class="toprow"><span id="cat" class="pill"></span><span id="counter" class="qnum"></span></div><div class="progress"><i id="prog"></i></div><div id="qtext" class="qtext"></div><div class="choices"><button id="circle" class="choice circle" onclick="answer(1)">○</button><button id="cross" class="choice cross" onclick="answer(0)">×</button></div><div id="feedback" class="feedback"></div><details id="detail"><summary>解説を見る</summary><div id="explain" class="explain"></div></details><div class="actions"><button class="btn" onclick="prevQ()">前へ</button><button id="next" class="btn primary" onclick="nextQ()">次へ</button></div></div></section>
<section id="result" class="screen"><div class="card"><div class="toprow"><span class="pill">結果</span><span class="qnum">合格目安 30/50</span></div><div id="resultScore" class="resultScore"></div><div id="judgement" style="text-align:center;font-size:24px;font-weight:900"></div><div id="bars" class="bars"></div><div id="analysis" class="analysis"></div><div class="actions"><button class="btn primary" onclick="resetQuiz()">もう一度解く</button></div></div></section>
<section id="sets" class="screen"><div class="card"><h2 style="margin-top:0">問題セット</h2><p><b>第1回 模試</b><br><span class="small">50問・○×形式・分野別分析付き</span></p><button class="btn primary" onclick="resetQuiz();show('quiz')">このセットを開始</button><hr style="border:0;border-top:1px solid var(--line);margin:20px 0"><h3>バックアップ</h3><button class="btn" onclick="exportJSON()">問題セットをJSONで保存</button><label class="btn" style="display:inline-block;margin-top:8px">JSONを読み込む<input type="file" accept="application/json" hidden onchange="importJSON(this.files[0])"></label></div></section>
<section id="import" class="screen"><div class="card"><h2 style="margin-top:0">画像・PDFから追加</h2><div class="warn">自動OCRは問題文の下書きを作ります。法律問題の正解・解説は誤判定防止のため、解答用紙または監修済みデータで確認してから登録してください。</div><div class="uploadbox"><input id="files" type="file" multiple accept="image/*,application/pdf"><p>画像またはPDFを選択</p><button class="btn primary" onclick="extractFiles()">OCRで下書き作成</button><p class="small">画像はブラウザ内で処理します。PDFは文字埋込み型なら抽出できます。写真PDFは画像として書き出すと安定します。</p></div><div id="status" class="small" style="margin-top:12px"></div><div id="draft" class="draft"></div><button id="saveDraft" class="btn primary" style="display:none;margin-top:12px" onclick="saveDraft()">下書きを問題セットに追加</button></div></section>
</div><script>
const builtin=[[1, "用語・定義", "貸金業法における「債務者等」とは、債務者または保証人に加え、債務者となろうとする者および保証人となろうとする者をいう。", 1, "「債務者等」には、現在の債務者・保証人だけでなく、これらになろうとする者も含まれます。"], [2, "用語・定義", "「極度方式基本契約」とは、顧客および保証人となろうとする者によりあらかじめ定められた条件に従った返済を条件として、顧客の請求に応じ極度額内で貸付けを行う契約をいう。", 0, "極度方式基本契約の定義は資金需要者である顧客との契約を中心に定められており、設問のように「保証人となろうとする者」を契約当事者として定義に加える表現は不適切です。"], [3, "登録制度", "法人が登録を受けようとする場合、常務に従事するすべての役員の貸付業務経験が2年未満なら、登録を拒否される。", 1, "法人には、貸付けの業務に一定期間従事した経験を有する常務役員を置く人的要件があり、全員が要件を満たさない場合は拒否事由となります。"], [4, "登録制度", "法人の貸金業者が登録申請書に記載された役員を変更したときは、変更日から2週間以内に登録行政庁へ届け出なければならない。", 1, "役員など登録事項の変更は、原則として変更後2週間以内の届出が必要です。"], [5, "登録制度", "貸金業登録の有効期間は3年であり、継続する場合は期間満了の3か月前までに更新申請をしなければならない。", 0, "登録の有効期間は3年ですが、更新申請の提出期限について「3か月前まで」とする部分が不適切です。"], [6, "登録制度", "都道府県知事登録の貸金業者が2以上の都道府県に営業所を持つことになった場合、新設営業所所在地の都道府県知事へ登録申請する。", 0, "2以上の都道府県に営業所等を設ける場合は内閣総理大臣登録の対象となり、新設地の知事への単純な申請ではありません。"], [7, "内部管理", "総合的な監督指針上、内部管理部門とは法令等遵守を確保する内部事務管理・法務部門等をいい、内部監査部門とは営業部門から独立した検査・監査部門等をいう。", 1, "内部管理部門と、営業部門から独立して検証する内部監査部門は区別して整備することが求められます。"], [8, "内部管理", "委託先の選定基準や外部委託リスク発生時の対応を社内規則に定め、役職員が適切に運用できるよう研修等で周知することが求められる。", 1, "外部委託管理では、基準・リスク対応を規程化し、役職員への周知徹底を図ることが重要です。"], [9, "内部管理", "外部委託先の責任部署明確化、実施状況のモニタリング、顧客情報管理の確認に加え、資金需要者等に貸金業者自身が業務を行った場合と同様の権利を確保することまで求められる。", 0, "監督上は委託先の管理・モニタリング等が求められますが、設問末尾のような一律の権利確保までを同じ要件として表現するのは不適切です。"], [10, "反社会的勢力", "反社会的勢力から不当要求を受けた場合、担当者や担当部署だけに任せず、経営陣が関与して組織的に対応しなければならない。", 1, "反社会的勢力への対応は、経営陣の関与の下で組織として行うことが求められます。"], [11, "監督・自主規制", "監督当局は不祥事件届出時に深度あるヒアリングを行い、必要に応じ報告徴求により貸金業者の自主的な改善状況を把握する。", 1, "不祥事件の原因・改善策等を確認し、必要に応じて報告徴求を行う監督対応が想定されています。"], [12, "監督・自主規制", "日本貸金業協会は、会員が法令・行政処分・定款等に違反した場合、必ず過怠金、権利停止・制限または除名処分を行わなければならない。", 0, "協会には処分権限がありますが、設問のように特定の処分を必ず行うとする表現は不適切です。"], [13, "主任者制度", "営業所の従業者200人のうち貸金業務従事者160人、非従事者40人の場合、常勤の貸金業務取扱主任者を5人以上置く必要がある。", 0, "必要数は法令上の算定対象となる従業者数に基づきます。本問の人数関係から5人以上とはなりません。"], [14, "主任者制度", "営業所唯一の主任者が急死して常勤者が不在になった場合、業務継続時は不在となった日から2週間以内に新たな主任者を置かなければならない。", 1, "やむを得ず必要数を欠いた場合には、所定期間内に補充する必要があります。"], [15, "主任者制度", "主任者が営業所等に「常時勤務する者」であるためには、就業規則上の所属だけでなく、社会通念上常時勤務していると認められる実態が必要である。", 1, "形式的な所属だけでなく、実際の勤務実態により判断されます。"], [16, "従業者証明書", "従業者証明書の携帯対象には派遣社員等も含まれるが、勧誘を伴わない広告のみの業務や、営業所等で顧客と対面しない業務の従業員は含まれない。", 1, "貸金業務に従事する者が対象で、業務内容によって対象外となる者があります。"], [17, "業務規制", "変動金利の将来金利見通しや、物的担保の将来価格について、断定的判断を提供することは禁止される。", 1, "将来の不確実な事項について断定的な判断を示し、誤認させる行為は禁止対象となります。"], [18, "業務規制", "保証人となろうとする者に「主債務者が弁済することは確実」と誤解させるおそれのある説明をすることは、禁止行為に当たる。", 1, "保証のリスクを誤認させる説明は不適切であり、禁止行為に該当します。"], [19, "本人確認・書類", "契約時に印鑑、通帳、証書、カード、運転免許証、資格確認書、年金受給証等を徴求することは不当行為となる可能性が高いが、白紙委任状や類似書面の徴求は該当しない。", 0, "白紙委任状等の徴求も、顧客に著しく不利益を与えるおそれがあり、不正・著しく不当な行為となり得ます。"], [20, "業務規制", "資金繰りに窮した資金需要者の弱みに付け込み、一方的に不利な契約締結を強要することは、禁止される不正・著しく不当な行為に該当し得る。", 1, "顧客の弱みに付け込んだ不当な契約強要は、禁止行為として問題になります。"], [21, "広告・勧誘", "広告・勧誘で実際より著しく有利と誤認させる表示・説明をしても刑事罰の対象にはならず、行政処分だけの対象となる。", 0, "誇大・虚偽的な広告等は行政上の措置だけでなく、法令上の罰則対象となる場合があります。"], [22, "広告・勧誘", "協会員は強い拒否意思の表示を受けた日から最低1年間は一切勧誘せず、その後も架電、FAX、電子メール、DM、訪問等の私生活・業務への影響が大きい方法で勧誘しない対応が求められる。", 1, "自主規制基本規則では、明確な拒否意思を尊重し、一定期間およびその後の勧誘方法を厳しく制限します。"], [23, "広告・勧誘", "貸付条件を全く表示しない単なるイメージ広告をテレビCMで行う場合、貸金業法の広告規制を受けない。", 0, "イメージ広告であっても貸金業者の広告として法令・自主規制の対象となります。"], [24, "広告・勧誘", "営業所等における貸付条件等の掲示は、その営業所等で行う貸付けの種類ごとに、見やすい方法で行う必要がある。", 1, "顧客が容易に確認できるよう、貸付けの種類ごとに掲示する必要があります。"], [25, "書面交付", "契約の相手方に対する事前書面の交付義務に違反すると、業務改善命令・登録取消し・業務停止命令のほか、刑事罰も科されることがある。", 0, "書面交付義務違反に対する効果の組合せとして、設問のように刑事罰まで一律に述べるのは不適切です。"], [26, "書面交付", "極度方式基本契約締結時に事前書面を交付していても、その基本契約に基づく個別の極度方式貸付けを行うたびに事前書面を交付する必要はない。", 1, "所定の要件を満たす極度方式貸付けでは、個別貸付けごとの事前書面が省略される場合があります。"], [27, "書面交付", "契約締結時は遅滞なく契約内容を明らかにする書面を交付し、後に利率を下げる等、債務者の利益となる変更でも改めて書面を交付しなければならない。", 0, "債務者に有利な変更については、法令上、常に再交付が必要とは限りません。"], [28, "保証・書面", "保証契約締結時は保証人に保証契約内容の書面を交付し、さらに主たる貸付契約の内容を明らかにする書面も遅滞なく交付しなければならない。", 1, "保証人には保証内容だけでなく、主債務の内容を把握できる書面の交付も必要です。"], [29, "弁済・受取証書", "弁済を受けたときは直ちに受取証書を交付する。ただし預貯金口座を利用した弁済では、契約者から請求があっても交付不要である。", 0, "口座振替等でも、契約者から請求があれば受取証書の交付が必要となる場合があります。"], [30, "帳簿・保存", "極度方式基本契約の帳簿は、基本契約解除日または全ての個別契約の最終返済日のうち、いずれか早い日から少なくとも10年間保存する。", 0, "保存期間の起算は権利関係が終了する時点を基準とし、「いずれか早い日」とする点が不適切です。"], [31, "帳簿・保存", "貸金業法19条の帳簿は、現金自動設備だけの営業所・事務所を含め、すべての営業所等ごとに備え付けなければならない。", 0, "現金自動設備のみの場所については、帳簿備付けの扱いに例外があります。"], [32, "取立て規制", "債務者の自発的承諾がある場合、連絡手段がほかにない場合、社会通念上相当な場合には、午後9時から午前8時に電話・FAX・訪問をしても直ちに違法とは限らない。", 1, "正当な理由がある場合には、時間帯規制の例外となり得ます。"], [33, "取立て規制", "取立ての時間帯規制における「正当な理由」に該当する可能性が高い例に、債務者の自発的承諾がある場合は含まれない。", 0, "債務者の自発的承諾は、正当な理由の判断要素となり得ます。"], [34, "取立て規制", "債務者の自宅に電話し家族が受けた際、債務者本人から家族に知られないよう要請されていなくても、貸金業者であることを名乗り心理的圧迫を加えると直ちに違反となる。", 1, "第三者である家族への不当な開示や心理的圧迫を伴う取立ては問題となります。"], [35, "取立て規制", "債務者にクレジットカードの利用により弁済するよう要求しても、貸金業法違反となる可能性は低い。", 0, "他の信用供与を利用させて返済させる要求は、生活を圧迫する不当な取立てとなるおそれがあります。"], [36, "債権譲渡", "貸金業者でない者へ債権を譲渡した場合、債務者に債権内容を明らかにする書面を遅滞なく交付する義務を負うのは譲受人であり、譲渡人ではない。", 1, "譲受人が貸金業者でなくても、法定事項を記載した書面の交付義務が課されます。"], [37, "債権譲渡", "極度方式貸付けの債権を他の貸金業者へ譲渡する際、譲受人に対し、譲渡人の商号・住所・返済方法・返済場所等を内閣府令の方法で通知しなければならない。", 0, "通知すべき事項・通知主体の関係が逆になっており、設問の表現は不適切です。"], [38, "債権譲渡", "貸金業者から貸付債権を譲り受けた者がさらに譲渡するときは、その債権が貸金業者の貸付契約に基づき発生したこと等を書面で通知しなければならない。", 1, "転々譲渡される場合にも、元の貸付契約に由来する債権であること等の通知が必要です。"], [39, "債権譲渡", "債権譲渡が禁止される「取立制限者」には、暴力団員等、暴力団支配法人・団体の構成員、取立行為規制違反や刑法・暴力行為等処罰法違反のおそれが明らかな者が含まれる。", 1, "反社会的勢力や違法取立てのおそれが明らかな者への債権譲渡は制限されます。"], [40, "信用情報", "指定信用情報機関の指定を受けられるのは一定の法人・外国法人等に限られ、自然人は指定を受けられない。", 1, "指定信用情報機関には法人格等の要件があり、自然人は対象外です。"], [41, "信用情報", "貸金業法上の「信用情報」とは、資金需要者である顧客または債務者の借入金の返済能力に関する情報をいう。", 1, "信用情報は、顧客等の返済能力に関する情報を指します。"], [42, "信用情報", "「個人信用情報」には氏名、住所、生年月日は含まれるが、電話番号および勤務先の商号・名称は含まれない。", 0, "電話番号や勤務先に関する事項も、個人を識別し信用判断に用いられる情報として対象となり得ます。"], [43, "信用情報", "個人顧客から取得する同意には、指定信用情報機関が他の加盟貸金業者に個人信用情報を提供する旨が含まれる。", 1, "信用情報の登録・照会・加盟業者間提供を含む同意が必要です。"], [44, "信用情報", "個人顧客から取得する同意には、自社が加入する指定信用情報機関への提供と、その機関が他の加盟貸金業者へ提供する旨が含まれる。", 1, "自社から信用情報機関への提供と、機関から他加盟業者への提供の双方を含む同意が必要です。"], [45, "信用情報", "信用情報提供契約を締結した貸金業者は、契約締結後に貸付契約を結んだ個人顧客の個人信用情報を機関へ提供する場合、顧客本人の同意を取得する必要はない。", 0, "個人信用情報の提供には、原則として本人の同意が必要です。"], [46, "信用情報", "個人顧客と極度方式基本契約を締結する際は原則として信用情報を利用して返済能力を調査するが、営業のために行われる契約なら信用情報を使用する必要はない。", 1, "事業資金目的など法令上の除外に該当する場合、個人向け総量規制・信用情報利用の一部が適用除外となります。"], [47, "総量規制", "総量規制の対象は貸金業者が行う個人への貸付契約に限られ、保証契約や法人との契約は対象とならない。", 1, "総量規制は原則として個人向け貸付けを対象とし、保証や法人向け契約は対象外です。"], [48, "総量規制", "一定の高額療養費の貸付けは年収の3分の1を超えても、返済が合理的に見込まれる場合、個人顧客の利益保護に支障がない契約として総量規制の例外となり得る。", 1, "高額療養費等の社会的必要性が高い貸付けには、要件を満たす例外があります。"], [49, "総量規制", "現在事業を営んでいない個人顧客への新規事業資金の貸付けが例外契約となるには、事業用資金であることが確実に認められる必要がある。", 1, "事業計画等から事業資金であることが確認でき、返済能力に問題がないことなどが必要です。"], [50, "総量規制", "売却予定の個人顧客所有不動産の売却代金で返済する貸付けで、貸付額が当該不動産価格の範囲内かつ売却により生活に支障がないと認められる場合、例外契約に該当し得る。", 1, "売却予定不動産を返済原資とする貸付けは、金額・生活への影響等の要件を満たせば例外となり得ます。"]];
let questions=JSON.parse(localStorage.getItem('kashikin_questions')||'null')||builtin.map(x=>({n:x[0],cat:x[1],text:x[2],answer:x[3],explain:x[4]}));let idx=0,answers=Array(questions.length).fill(null),draft=[];
function show(id){document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));document.getElementById(id).classList.add('active');if(id==='quiz')render()}
function render(){if(idx>=questions.length){finish();return}const q=questions[idx];cat.textContent=q.cat;counter.textContent=`${idx+1} / ${questions.length}`;prog.style.width=`${(idx)/questions.length*100}%`;qtext.textContent=q.text;explain.textContent=q.explain||'解説は未登録です。';detail.open=false;feedback.className='feedback';feedback.textContent='';circle.disabled=cross.disabled=false;next.textContent=idx===questions.length-1?'結果を見る':'次へ';if(answers[idx]!==null)showFeedback(answers[idx],false)}
function answer(v){answers[idx]=v;showFeedback(v,true)}
function showFeedback(v,open){const q=questions[idx],ok=v===Number(q.answer);feedback.className='feedback '+(ok?'ok':'ng');feedback.textContent=ok?'正解！':`不正解　正解は「${Number(q.answer)?'○':'×'}」`;circle.disabled=cross.disabled=true;if(open)detail.open=true}
function nextQ(){if(answers[idx]===null){feedback.className='feedback ng';feedback.textContent='○か×を選んでください';return}idx++;render()}
function prevQ(){if(idx>0){idx--;render()}}
function finish(){show('result');const score=answers.reduce((s,a,i)=>s+(a===Number(questions[i].answer)),0);resultScore.textContent=`${score} / ${questions.length}`;const pass=score>=Math.ceil(questions.length*.6);judgement.textContent=pass?'合格圏':'不合格圏';judgement.className=pass?'pass':'fail';const cats={};questions.forEach((q,i)=>{cats[q.cat]??={ok:0,total:0};cats[q.cat].total++;if(answers[i]===Number(q.answer))cats[q.cat].ok++});bars.innerHTML=Object.entries(cats).map(([k,v])=>`<div class="barrow"><div class="label"><b>${k}</b><span>${v.ok}/${v.total}（${Math.round(v.ok/v.total*100)}%）</span></div><div class="bar"><i style="width:${v.ok/v.total*100}%"></i></div></div>`).join('');const weak=Object.entries(cats).sort((a,b)=>a[1].ok/a[1].total-b[1].ok/b[1].total).slice(0,3);analysis.innerHTML=`<b>学習分析</b><br>${weak.map(([k,v])=>`${k}（${Math.round(v.ok/v.total*100)}%）`).join('、')}を優先して復習すると効率的です。間違えた問題は「原則」「例外」「期限・人数」のどこを取り違えたかを分類し、条文の数字と主体をセットで覚えてください。`}
function resetQuiz(){idx=0;answers=Array(questions.length).fill(null);render()}
function exportJSON(){const b=new Blob([JSON.stringify(questions,null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='kashikin_questions.json';a.click()}
function importJSON(f){if(!f)return;const r=new FileReader();r.onload=()=>{try{questions=JSON.parse(r.result);localStorage.setItem('kashikin_questions',JSON.stringify(questions));resetQuiz();alert('読み込みました')}catch(e){alert('JSON形式を確認してください')}};r.readAsText(f)}
async function loadScript(src){return new Promise((res,rej)=>{const s=document.createElement('script');s.src=src;s.onload=res;s.onerror=rej;document.head.appendChild(s)})}
async function extractFiles(){const fs=[...files.files];if(!fs.length)return;status.textContent='ライブラリを読み込んでいます…';try{if(!window.Tesseract)await loadScript('https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js');if(!window.pdfjsLib){await loadScript('https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js');pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js'}draft=[];let all='';for(let i=0;i<fs.length;i++){const f=fs[i];status.textContent=`${i+1}/${fs.length} ${f.name} を解析中…`;if(f.type==='application/pdf'){const pdf=await pdfjsLib.getDocument({data:await f.arrayBuffer()}).promise;for(let p=1;p<=pdf.numPages;p++){const page=await pdf.getPage(p);const tc=await page.getTextContent();all+='\n'+tc.items.map(x=>x.str).join(' ')}}else{const out=await Tesseract.recognize(f,'jpn',{logger:m=>{if(m.progress)status.textContent=`OCR ${Math.round(m.progress*100)}%：${f.name}`}});all+='\n'+out.data.text}}const parts=all.split(/(?:^|\n|\s)[\(（]?([1-9]|[1-4][0-9]|50)[\)）\.、]\s*/).filter(x=>x&&x.trim());for(let i=0;i<parts.length-1;i+=2){const n=Number(parts[i]),text=parts[i+1].replace(/\s+/g,' ').trim();if(n&&text.length>8)draft.push({n,cat:'未分類',text,answer:1,explain:'解説を入力してください。'})}if(!draft.length){draft=[{n:1,cat:'未分類',text:all.replace(/\s+/g,' ').trim().slice(0,2000),answer:1,explain:'OCR結果を編集してください。'}]}renderDraft();status.textContent=`${draft.length}問の下書きを作成しました。内容を修正して保存してください。`}catch(e){status.textContent='解析に失敗しました：'+e.message}}
function renderDraft(){draftEl=document.getElementById('draft');draftEl.innerHTML=draft.map((q,i)=>`<div class="draftitem"><b>問${q.n}</b><textarea class="field" rows="4" oninput="draft[${i}].text=this.value">${esc(q.text)}</textarea><select class="field" onchange="draft[${i}].answer=Number(this.value)"><option value="1">正解：○</option><option value="0">正解：×</option></select><input class="field" value="${esc(q.cat)}" oninput="draft[${i}].cat=this.value" placeholder="分野"><textarea class="field" rows="3" oninput="draft[${i}].explain=this.value" placeholder="解説">${esc(q.explain)}</textarea></div>`).join('');saveDraft.style.display='block'}
function esc(s){return String(s).replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function saveDraft(){questions=draft.map((q,i)=>({...q,n:i+1}));localStorage.setItem('kashikin_questions',JSON.stringify(questions));resetQuiz();show('quiz');alert('問題セットを保存しました')}
if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js').catch(()=>{}))}
render();</script></body></html>
